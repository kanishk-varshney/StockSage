<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSage - Stock Analysis</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>StockSage</h1>
        <p class="subtitle">Enter a stock symbol to begin analysis</p>

        <form id="process-form" onsubmit="startProcessing(event); return false;">
            <div class="form-group">
                <label for="symbol">
                    Stock Symbol
                    <span class="help-icon-wrapper" tabindex="0" role="button" aria-label="Symbol format help" data-tooltip="US stocks: 1-5 letters (AAPL). Indian stocks: add .NS or .BO (RELIANCE.NS).">
                        <i class="fas fa-info-circle help-icon"></i>
                    </span>
                </label>
                <input 
                    type="text" 
                    id="symbol" 
                    name="symbol" 
                    placeholder="e.g., AAPL, GOOGL, RELIANCE.NS"
                    required
                    autofocus
                >
            </div>
            <button type="submit">Analyze Stock</button>
            <span id="spinner" style="display: none; margin-left: 1rem; color: #a78bfa;">Analyzing...</span>
        </form>

        <div id="global-verdict-badge" class="global-verdict-badge" style="display:none;" aria-live="polite"></div>

        <div class="logs-container">
            <h3>Analysis Workspace</h3>
            <div id="progress-wrapper" style="display:none;">
                <div id="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div id="progress-label"></div>
            </div>
            <div id="logs" aria-live="polite">
                <div class="empty-state">Enter a stock symbol above to view your analysis.</div>
            </div>
        </div>

        <script src="/static/js/main.js"></script>
    </div>
</body>
</html>
