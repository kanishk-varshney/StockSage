<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSage - Stock Analysis</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <div class="container">
        <h1>StockSage</h1>
        <p class="subtitle">Enter a stock symbol to begin analysis</p>

        <form id="process-form" onsubmit="startProcessing(event); return false;">
            <div class="form-group">
                <label for="symbol">
                    Stock Symbol
                    <span class="help-icon-wrapper" data-tooltip="US: 1-5 letters (e.g., AAPL) | Indian: SYMBOL.NS or SYMBOL.BO (e.g., RELIANCE.NS)">
                        <i class="fas fa-info-circle help-icon"></i>
                    </span>
                </label>
                <input 
                    type="text" 
                    id="symbol" 
                    name="symbol" 
                    placeholder="e.g., AAPL, GOOGL, RELIANCE.NS"
                    required
                    autofocus
                >
            </div>
            <button type="submit">Process Symbol</button>
            <span id="spinner" style="display: none; margin-left: 1rem; color: #a78bfa;">Processing...</span>
        </form>

        <div class="logs-container">
            <h3>Processing Logs</h3>
            <div id="progress-wrapper" style="display:none;">
                <div id="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div id="progress-label"></div>
            </div>
            <div id="logs">
                <div class="empty-state">No logs yet. Enter a symbol above to start processing.</div>
            </div>
        </div>

        <script src="/static/js/main.js"></script>
    </div>
</body>
</html>
