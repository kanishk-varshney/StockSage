services:
  stocksage:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist downloaded market data between container restarts
      - .market_data:/app/.market_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
